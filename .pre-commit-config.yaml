---
exclude: ^coverage/|^tmp/
repos:
  - repo: https://github.com/mpalmer/action-validator
    rev: v0.7.0
    hooks:
      - id: action-validator

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: tests/snapshots/.*\.svg$

  - repo: https://github.com/fsouza/mirrors-pyright
    rev: v1.1.407
    hooks:
      - id: pyright

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.5
    hooks:
      - id: ruff-check
        args: [--fix, --unsafe-fixes]
      - id: ruff-format
        args: [--check]

  - repo: https://github.com/crate-ci/typos
    rev: v1.34.0
    hooks:
      - id: typos
        args: [--write-changes]
        exclude: __snapshots__/.*\.svg$

  - repo: local
    hooks:
      - id: custom-precommit-check
        name: Custom pre-commit check
        entry: bash scripts/custom_precommit_check.sh
        language: system
        pass_filenames: false
        always_run: true

      - id: pytest
        name: Run Python tests
        entry: uv run pytest tests/
        language: system
        pass_filenames: false
        always_run: true

      - id: import-linter
        name: Check architecture with import-linter
        entry: uv run import-linter lint
        language: system
        pass_filenames: false
        always_run: true

      - id: npm-test
        name: Run JavaScript tests
        entry: npm test
        language: system
        pass_filenames: false
        always_run: true
