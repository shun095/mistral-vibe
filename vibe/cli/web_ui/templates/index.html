<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mistral Vibe Web UI</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Mistral Vibe</h1>
            <div class="status" id="status">Disconnected</div>
        </header>

        <main class="chat-container">
            <div class="messages" id="messages">
                <div class="message system">
                    <p>Welcome to Mistral Vibe! Connect to start chatting.</p>
                </div>
            </div>

            <div class="input-area">
                <div id="processing-indicator" class="processing-indicator" style="display: none;">
                    <div class="processing-spinner"></div>
                    <span>Processing...</span>
                </div>
                <textarea
                    id="message-input"
                    placeholder="Type your message..."
                    rows="1"
                ></textarea>
                <button id="send-btn" disabled>Send</button>
                <button id="interrupt-btn" class="interrupt-btn" style="display: none;">
                    <span>⏹️</span> Interrupt
                </button>
            </div>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
